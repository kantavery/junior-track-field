<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>新春駅伝大会 競技種目（2026年度想定）</title>

<style>
  :root {
    --navy: #102a43; --ink: #172033; --muted: #667085;
    --branch: #16a34a; --branch-soft: #ecfdf3; --branch-line: #86efac;
    --tokyo: #2563eb; --tokyo-soft: #eff6ff; --tokyo-line: #93c5fd;
    --red: #d62828; --line: rgba(16,42,67,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui,-apple-system,sans-serif; background: #f4f7fb; color: var(--ink); }
  .wrap { max-width: 860px; margin: 0 auto; padding: 16px 16px 48px; }
  .back { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 18px;
          padding: 8px 14px; border-radius: 999px; background: white;
          border: 1px solid var(--line); text-decoration: none; color: var(--ink);
          font-weight: 800; font-size: 0.85rem; }
  .back:hover { background: #f0f4f8; }
  .header { border-radius: 22px; padding: 20px; margin-bottom: 20px;
             color: white; box-shadow: 0 8px 28px rgba(16,42,67,0.18); }
  .header.branch { background: linear-gradient(135deg, #15803d, #16a34a); }
  .header.tokyo  { background: linear-gradient(135deg, #1d4ed8, #2563eb); }
  .header .cat { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
                 font-weight: 800; opacity: 0.8; margin-bottom: 6px; }
  .header h1 { font-size: clamp(1.2rem, 5vw, 1.8rem); line-height: 1.25;
               letter-spacing: -0.04em; margin-bottom: 6px; }
  .header .meta { font-size: 0.9rem; opacity: 0.85; }
  .notice { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 14px;
            padding: 12px 16px; margin-bottom: 18px; font-size: 0.88rem; line-height: 1.6; color: #92400e; }
  .section-title { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
                   font-weight: 900; color: var(--muted); margin: 22px 0 10px; }
  .grid { display: grid; gap: 10px; }
  @media (min-width: 500px) { .grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 720px) { .grid { grid-template-columns: 1fr 1fr 1fr; } }
  .card { background: white; border: 1px solid var(--line); border-radius: 16px;
          padding: 14px 16px; box-shadow: 0 2px 8px rgba(16,42,67,0.06); }
  .label { display: inline-flex; padding: 3px 8px; border-radius: 6px;
           font-size: 0.7rem; font-weight: 900; margin-bottom: 8px; }
  .track { background: #dbeafe; color: #1e40af; }
  .field { background: #dcfce7; color: #14532d; }
  .road  { background: #fef9c3; color: #713f12; }
  .relay { background: #ede9fe; color: #4c1d95; }
  .name { font-weight: 900; font-size: 1rem; margin-bottom: 4px; }
  .desc { color: var(--muted); font-size: 0.82rem; line-height: 1.55; }
  .relay-section { background: white; border: 1px solid var(--line); border-radius: 16px;
                   padding: 16px 18px; margin-top: 10px; }
  .relay-section h3 { font-size: 0.95rem; font-weight: 900; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th { padding: 8px 12px; background: #f8fafc; border-bottom: 2px solid var(--line);
       font-size: 0.75rem; font-weight: 900; color: var(--muted); text-align: left; }
  td { padding: 8px 12px; border-bottom: 1px solid var(--line); }
  tr:last-child td { border-bottom: none; }
</style>

</head>
<body>
<div class="wrap">
  <a class="back" href="/">&larr; 大会一覧に戻る</a>
  <div class="header branch">
    <p class="cat">第2支部 | 2026年度（2027/1/10）</p>
    <h1>新春駅伝大会 競技種目（2026年度想定）</h1>
    <p class="meta">1/10(日)　会場未確定</p>
  </div>
  <div class="notice">
⚠️ <strong>2025年の要項をもとに2026年を想定して作成しています。</strong><br>
実際の競技種目は公式要項・第2支部サイトで必ず確認してください。
</div>
<p class="section-title">種目</p>
<div class="grid"><div class="card">
  <div class="label road">ロード</div>
  <div class="name">女子駅伝</div>
  <div class="desc">3区間（参考：2025年）</div>
</div><div class="card">
  <div class="label road">ロード</div>
  <div class="name">男子駅伝</div>
  <div class="desc">4区間（参考：2025年）</div>
</div><div class="card">
  <div class="label track">トラック</div>
  <div class="name">女子3000m</div>
  <div class="desc">駅伝終了後</div>
</div></div>
<div class="relay-section" style="margin-top:16px">
  <h3>駅伝の構成（2025年参考）</h3>
  <table>
    <thead><tr><th>種別</th><th>選手数</th><th>区間</th><th>タスキ規格</th></tr></thead>
    <tbody>
      <tr><td>男子駅伝</td><td>4名（補欠2名）</td><td>4区間</td><td rowspan="2">長さ1m60cm〜1m80cm・幅6cm</td></tr>
      <tr><td>女子駅伝</td><td>3名（補欠1名）</td><td>3区間</td></tr>
    </tbody>
  </table>
</div>
</div>
</body>
</html>
